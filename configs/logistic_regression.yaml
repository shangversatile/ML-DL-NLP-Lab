seed: 42

data:
  n_samples: 200
  n_features: 2
  val_ratio: 0.2

training:
  learning_rate: 0.1
  num_epochs: 300
  log_every: 50
  threshold: 0.5

evaluation:
  thresholds: [0.3, 0.5, 0.7]

logging:
  log_file: results/logs/logistic_regression_training.log

output:
  loss_curve_path: results/figures/logistic_regression_loss_curve.png
