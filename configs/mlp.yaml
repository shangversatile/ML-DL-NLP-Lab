seed: 42

data:
  n_samples: 400
  noise: 0.15
  val_ratio: 0.2

model:
  hidden_dim: 16

training:
  num_epochs: 300
  batch_size: 32
  log_every: 50
  threshold: 0.5

optimizer:
  name: adam
  learning_rate: 0.01
  beta1: 0.9
  beta2: 0.999
  epsilon: 1e-8

output:
  loss_curve_path: results/figures/mlp_xor_training_loss_curve.png

logging:
  log_file: results/logs/mlp_xor_training.log
