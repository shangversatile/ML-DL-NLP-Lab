seed: 42

data:
  scale_pixels: true
  val_ratio: 0.15
  test_ratio: 0.15

model:
  hidden_dim: 64
  num_classes: 10

training:
  num_epochs: 300
  batch_size: 64
  log_every: 50

optimizer:
  name: adam
  learning_rate: 0.01
  beta1: 0.9
  beta2: 0.999
  epsilon: 1e-8

analysis:
  top_k_values: [1, 3, 5]
  high_confidence_threshold: 0.90
  max_examples_to_plot: 25

output:
  confusion_matrix_counts_path: results/figures/digits_confusion_matrix_counts.png
  confusion_matrix_normalized_path: results/figures/digits_confusion_matrix_normalized.png
  top_loss_examples_path: results/figures/digits_top_loss_examples.png
  high_confidence_errors_path: results/figures/digits_high_confidence_errors.png

logging:
  log_file: results/logs/digits_error_analysis.log
